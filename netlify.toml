# netlify.toml — Mohammed Rishab Portfolio
# Deploy to Netlify with zero config. Drop repo → Netlify auto-detects.

[build]
  publish = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.(woff2|woff|ttf)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/github"
  to = "https://github.com/mohdrishab"
  status = 301

[[redirects]]
  from = "/linkedin"
  to = "https://linkedin.com/in/mohdrishab"
  status = 301
